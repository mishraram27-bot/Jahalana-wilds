<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .scan-anim {
            animation: scanline 3s linear infinite;
        }
        .pulse-anim {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(10, 12, 11, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        body {
            overscroll-behavior: none;
            background-color: #050606;
        }
    </style>
</head>
<body class="font-body-md text-on-surface antialiased overflow-hidden h-screen w-screen flex flex-col bg-ink-black">
<!-- Camera Viewfinder Layer -->
<div class="fixed inset-0 z-0 bg-black flex items-center justify-center overflow-hidden">
<div class="relative w-full h-full opacity-60">
<img class="w-full h-full object-cover grayscale-[20%] brightness-75" data-alt="A high-resolution wide-angle view of a majestic Indian leopard resting on a granite rock in the arid scrub forest of Jhalana. The lighting is golden hour, casting deep shadows and warm highlights on the animal's spotted coat. The scene is shot with a shallow depth of field, blurring the thorny Aravali vegetation in the background. The overall aesthetic is cinematic, echoing a premium wildlife documentary style with rich textures and deep forest greens." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2UOyS6qK0EKknwyQcdcwmCuxRYRye5AaWc4rCOCY8-X4mhSTX8RksNb4kUQ9jQwqvkRrQnmSJsBAL12lS4Hb8UjBRC2F7SlU5VrXD-NooZPpUh2McqgbdE1cutibfBmkIdWoQP1md_fQH_Qz6ueiw3sNQV-EYFLuY4Ym_LXgwY_1EQZS9JRdACl3I2d8yPXU-ayK6p9-4h2sc-aVSiwGE7KlRoVB1HkDCytRZ7Gv7UlzcMbfJ5aYotMP0GmOhsCVOxleHzqKCboQ"/>
<!-- AI Scanning Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<!-- Targeting Reticle -->
<div class="relative w-72 h-72 border-2 border-white/10 rounded-xl">
<!-- Scanning Beam -->
<div class="absolute inset-x-0 h-1 bg-gradient-to-r from-transparent via-leopard-gold to-transparent scan-anim opacity-90 shadow-[0_0_15px_rgba(255,233,191,0.5)]"></div>
<!-- Corner Brackets -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-leopard-gold rounded-tl-lg shadow-[0_0_10px_rgba(255,233,191,0.4)]"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-leopard-gold rounded-tr-lg shadow-[0_0_10px_rgba(255,233,191,0.4)]"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-leopard-gold rounded-bl-lg shadow-[0_0_10px_rgba(255,233,191,0.4)]"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-leopard-gold rounded-br-lg shadow-[0_0_10px_rgba(255,233,191,0.4)]"></div>
<!-- Pulse Center -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="w-4 h-4 bg-leopard-gold rounded-full pulse-anim shadow-[0_0_20px_rgba(255,233,191,0.8)]"></div>
</div>
</div>
</div>
<!-- Tracking Labels -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 mt-40 pointer-events-none">
<div class="flex items-center gap-2 px-4 py-1.5 bg-black/80 backdrop-blur-md rounded-full border border-leopard-gold/30">
<span class="w-2 h-2 bg-leopard-gold rounded-full animate-pulse shadow-[0_0_5px_rgba(255,233,191,0.8)]"></span>
<span class="font-label-bold text-[10px] text-leopard-gold tracking-[0.2em] uppercase">Target Locked: Rana</span>
</div>
</div>
</div>
</div>
<!-- UI Interaction Layer -->
<div class="relative z-10 flex flex-col h-full justify-between p-margin-mobile pointer-events-none">
<!-- Top Toolbar -->
<div class="flex justify-between items-start pointer-events-auto">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-on-surface shadow-lg border border-white/10 active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-end">
<div class="glass-panel px-4 py-2 rounded-xl flex items-center gap-3 border border-white/10 shadow-lg">

<span class="font-label-bold text-xs text-leopard-gold">4G LTE (Secure)</span>
</div>
<span class="material-symbols-outlined text-leopard-gold">sensors</span>
</div>
</div>
</div>

<div class="flex flex-col gap-component-gap pointer-events-auto mb-4">

</div>
<div class="bg-leopard-gold/10 border border-leopard-gold/30 text-leopard-gold px-3 py-1.5 rounded-full flex items-center gap-2">

</div>
</div>

</div>
<div class="bg-white/5 p-4 rounded-xl border border-white/10">
<span class="font-label-bold text-[10px] text-on-surface-variant uppercase mb-1 block">Zone</span>
<span class="font-label-bold text-sm text-on-surface">Jhalana Proper</span>
</div>
<div class="col-span-2 bg-white/5 p-4 rounded-xl border border-white/10 flex items-center justify-between">
<div>

<span class="material-symbols-outlined">add_circle</span>
                Add to Sightings Log
            </button>
</div>

</button>

<div class="absolute inset-0 bg-white/10 rounded-full scale-110 blur-md group-active:scale-95 transition-all"></div>
<div class="absolute inset-0 border-2 border-white/30 rounded-full"></div>
<div class="w-16 h-16 bg-off-white rounded-full shadow-[0_0_20px_rgba(255,255,255,0.3)] group-active:scale-90 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-deep-forest text-3xl">photo_camera</span>
</div>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-on-surface border border-white/10">
<span class="material-symbols-outlined">settings</span>
</button>
</div>

<!-- Background Atmospheric micro-gradient -->
<div class="fixed inset-0 pointer-events-none bg-gradient-to-t from-black via-black/40 to-black/60 z-1"></div>
<script>
    // Micro-interaction for shutter click
    document.querySelector('button.relative.w-20').addEventListener('click', () => {
        const flash = document.createElement('div');
        flash.className = 'fixed inset-0 bg-white z-[100] transition-opacity duration-200 pointer-events-none';
        document.body.appendChild(flash);
        setTimeout(() => {
            flash.style.opacity = '0';
            setTimeout(() => flash.remove(), 200);
        }, 50);
    });

    // Simulating ID log interaction
    const logBtn = document.querySelector('button.bg-deep-forest');
    logBtn.addEventListener('click', () => {
        logBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Recording...';
        setTimeout(() => {
            logBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Sighting Logged';
            logBtn.classList.remove('bg-deep-forest');
            logBtn.classList.add('bg-leopard-gold', 'text-deep-forest');
        }, 1500);
    });
</script>
</body></html>
