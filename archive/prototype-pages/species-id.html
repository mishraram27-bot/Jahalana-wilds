<!DOCTYPE html>

<html class="light" lang="en"><head>

<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .scan-anim {
            animation: scanline 3s linear infinite;
        }
        .pulse-anim {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        body {
            overscroll-behavior: none;
            background-color: #000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased overflow-hidden h-screen w-screen flex flex-col">
<!-- Camera Viewfinder Layer -->
<div class="fixed inset-0 z-0 bg-black flex items-center justify-center overflow-hidden">
<div class="relative w-full h-full">
<img class="w-full h-full object-cover" data-alt="A high-resolution wide-angle view of a majestic Indian leopard resting on a granite rock in the arid scrub forest of Jhalana. The lighting is golden hour, casting deep shadows and warm highlights on the animal's spotted coat. The scene is shot with a shallow depth of field, blurring the thorny Aravali vegetation in the background. The overall aesthetic is cinematic, echoing a premium wildlife documentary style with rich textures and deep forest greens." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2UOyS6qK0EKknwyQcdcwmCuxRYRye5AaWc4rCOCY8-X4mhSTX8RksNb4kUQ9jQwqvkRrQnmSJsBAL12lS4Hb8UjBRC2F7SlU5VrXD-NooZPpUh2McqgbdE1cutibfBmkIdWoQP1md_fQH_Qz6ueiw3sNQV-EYFLuY4Ym_LXgwY_1EQZS9JRdACl3I2d8yPXU-ayK6p9-4h2sc-aVSiwGE7KlRoVB1HkDCytRZ7Gv7UlzcMbfJ5aYotMP0GmOhsCVOxleHzqKCboQ"/>
<!-- AI Scanning Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<!-- Targeting Reticle -->
<div class="relative w-72 h-72 border-2 border-white/20 rounded-xl">
<!-- Scanning Beam -->
<div class="absolute inset-x-0 h-1 bg-gradient-to-r from-transparent via-sunset-amber to-transparent scan-anim opacity-80"></div>
<!-- Corner Brackets -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-sunset-amber rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-sunset-amber rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-sunset-amber rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-sunset-amber rounded-br-lg"></div>
<!-- Pulse Center -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="w-4 h-4 bg-sunset-amber rounded-full pulse-anim"></div>
</div>
</div>
</div>
<!-- Tracking Labels (Floating in viewfinder) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 mt-40 pointer-events-none">
<div class="flex items-center gap-2 px-3 py-1 bg-deep-forest/80 backdrop-blur-md rounded-full border border-white/10">
<span class="w-2 h-2 bg-sunset-amber rounded-full animate-pulse"></span>
<span class="font-label-bold text-[10px] text-white tracking-widest uppercase">Target Locked: Rana</span>
</div>
</div>
</div>
</div>
<!-- UI Interaction Layer -->
<div class="relative z-10 flex flex-col h-full justify-between p-margin-mobile pointer-events-none">
<!-- Top Toolbar -->
<div class="flex justify-between items-start pointer-events-auto">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-deep-forest shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-end">
<div class="glass-panel px-4 py-2 rounded-xl flex items-center gap-3">
<div class="flex flex-col items-end">
<span class="font-label-bold text-[10px] text-deep-forest uppercase tracking-tighter">Network</span>
<span class="font-label-bold text-xs text-sunset-amber">4G LTE (Secure)</span>
</div>
<span class="material-symbols-outlined text-deep-forest">sensors</span>
</div>
</div>
</div>
<!-- Species ID Result Card (Bottom Drawer) -->
<div class="flex flex-col gap-component-gap pointer-events-auto">
<!-- Result Panel -->
<div class="glass-panel rounded-2xl p-5 shadow-2xl border border-white/40">
<!-- Header -->
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="font-headline-sm text-headline-sm text-deep-forest mb-0">Rana</h2>
<span class="font-body-md text-sm text-on-surface-variant italic">Panthera pardus (Leopard)</span>
</div>
<div class="bg-deep-forest text-off-white px-3 py-1 rounded-full flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
<span class="font-label-bold text-[10px] tracking-wider uppercase">98% Match</span>
</div>
</div>
<!-- Info Grid (Bento Style) -->
<div class="grid grid-cols-2 gap-3 mb-6">
<div class="bg-aravali-sand/30 p-3 rounded-xl border border-aravali-sand/50">
<span class="font-label-bold text-[10px] text-on-surface-variant uppercase mb-1 block">Sex / Age</span>
<span class="font-label-bold text-sm text-deep-forest">Male, Adult (~7y)</span>
</div>
<div class="bg-aravali-sand/30 p-3 rounded-xl border border-aravali-sand/50">
<span class="font-label-bold text-[10px] text-on-surface-variant uppercase mb-1 block">Zone</span>
<span class="font-label-bold text-sm text-deep-forest">Jhalana Proper</span>
</div>
<div class="col-span-2 bg-primary/5 p-3 rounded-xl border border-primary/10 flex items-center justify-between">
<div>
<span class="font-label-bold text-[10px] text-on-surface-variant uppercase mb-1 block">Last Recorded Sighting</span>
<span class="font-label-bold text-sm text-deep-forest">Yesterday, 18:45 at Kali Ghati</span>
</div>
<span class="material-symbols-outlined text-sunset-amber">history</span>
</div>
</div>
<!-- CTA -->
<button class="w-full bg-deep-forest text-off-white py-4 rounded-xl font-label-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">add_circle</span>
                    Add to Sightings Log
                </button>
</div>
<!-- Shutter Controls -->
<div class="flex items-center justify-center gap-8 mb-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-deep-forest">
<span class="material-symbols-outlined">image</span>
</button>
<!-- Shutter Button -->
<button class="relative w-20 h-20 flex items-center justify-center group">
<div class="absolute inset-0 bg-white/20 rounded-full scale-110 blur-sm group-active:scale-95 transition-all"></div>
<div class="absolute inset-0 border-4 border-white rounded-full"></div>
<div class="w-16 h-16 bg-white rounded-full shadow-lg group-active:scale-90 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-deep-forest text-3xl">photo_camera</span>
</div>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-deep-forest">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
</div>
<!-- Background Atmospheric micro-gradient -->
<div class="fixed inset-0 pointer-events-none bg-gradient-to-t from-black/60 via-transparent to-black/20 z-1"></div>
<script>
        // Micro-interaction for shutter click
        document.querySelector('button.relative.w-20').addEventListener('click', () => {
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] transition-opacity duration-300 pointer-events-none';
            document.body.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 300);
            }, 50);
        });

        // Simulating ID lock sound/haptic
        const logBtn = document.querySelector('button.bg-deep-forest');
        logBtn.addEventListener('click', () => {
            logBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Recording...';
            setTimeout(() => {
                logBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Sighting Logged';
                logBtn.classList.replace('bg-deep-forest', 'bg-sunset-amber');
            }, 1500);
        });
    </script>
<script src="site-actions.js"></script>
</body></html>
