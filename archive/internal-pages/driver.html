<script>
    // Form Interactivity
    const leopardBtns = document.querySelectorAll('.leopard-btn');
    const zoneBtns = document.querySelectorAll('.zone-btn');
    const noteChips = document.querySelectorAll('.note-chip');
    const sightingForm = document.getElementById('sighting-form');

    const setupToggle = (elements, activeClass, inactiveBorder) => {
        elements.forEach(btn => {
            btn.addEventListener('click', () => {
                elements.forEach(b => {
                    b.classList.remove(activeClass, 'bg-primary/10', 'border-primary', 'active-ring');
                    b.querySelector('span')?.classList.remove('text-primary');
                    b.querySelector('span:last-child')?.classList.remove('text-primary');
                    b.classList.add(inactiveBorder);
                });
                btn.classList.add(activeClass, 'bg-primary/10', 'border-primary', 'active-ring');
                btn.querySelector('span')?.classList.add('text-primary');
                btn.querySelector('span:last-child')?.classList.add('text-primary');
                btn.classList.remove(inactiveBorder);
            });
        });
    };

    setupToggle(leopardBtns, 'selected-leopard', 'border-white/5');
    setupToggle(zoneBtns, 'selected-zone', 'border-white/5');

    noteChips.forEach(chip => {
        chip.addEventListener('click', () => {
            chip.classList.toggle('bg-primary');
            chip.classList.toggle('text-on-primary');
            chip.classList.toggle('border-primary');
            chip.classList.toggle('bg-surface-container-low');
        });
    });

    sightingForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = sightingForm.querySelector('button[type="submit"]');
        const originalContent = btn.innerHTML;
        const originalBg = btn.classList.contains('bg-primary') ? 'bg-primary' : 'bg-green-600';
        
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Submitting...';
        btn.classList.add('opacity-80', 'pointer-events-none');

        setTimeout(() => {
            btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Report Sent';
            btn.classList.replace('bg-primary', 'bg-green-600');
            btn.classList.replace('text-on-primary', 'text-white');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.replace('bg-green-600', 'bg-primary');
                btn.classList.replace('text-white', 'text-on-primary');
                btn.classList.remove('opacity-80', 'pointer-events-none');
                sightingForm.reset();
                document.querySelectorAll('.active-ring').forEach(el => {
                    el.classList.remove('active-ring', 'bg-primary/10', 'border-primary');
                    el.querySelectorAll('span').forEach(s => s.classList.remove('text-primary'));
                });
                document.querySelectorAll('.note-chip.bg-primary').forEach(el => el.click());
            }, 2000);
        }, 1200);
    });

    // Add haptic-like vibration on mobile if available
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        });
    });
</script>
